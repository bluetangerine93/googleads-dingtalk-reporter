name: Facebook Balance Monitor

on:
  repository_dispatch:
    types:
      - fb_balance_monitor
      - fb_account_status_monitor
      - fb_visa_balance_reminder
  workflow_dispatch:
    inputs:
      mode:
        description: "Monitor mode"
        required: true
        default: all
        type: choice
        options:
          - all
          - balance
          - status
          - visa_reminder
      period:
        description: "Reminder period"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - before_work
          - before_off_work
      dry_run:
        description: "Print Lark payload without sending"
        required: true
        default: false
        type: boolean

jobs:
  fb-balance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FB_ACCESS_TOKEN: ${{ secrets.FB_TOKEN }}
      FB_API_VERSION: v19.0
      FB_DAILY_ACCOUNTS: PocketMitra-02:act_699832393105441,PocketMitra-04:act_838379439062631
      FB_BALANCE_THRESHOLD_INR: 20000
      LARK_BALANCE_WEBHOOK: ${{ secrets.LARK_BALANCE_WEBHOOK }}
      LARK_BALANCE_KEYWORD: notification
      REPORT_TIMEZONE: Asia/Kolkata

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Choose args
        id: choose-args
        run: |
          mode="all"
          period="daily"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.mode }}"
            period="${{ inputs.period }}"
          elif [ "${{ github.event.action }}" = "fb_balance_monitor" ]; then
            mode="balance"
          elif [ "${{ github.event.action }}" = "fb_account_status_monitor" ]; then
            mode="status"
          elif [ "${{ github.event.action }}" = "fb_visa_balance_reminder" ]; then
            mode="visa_reminder"
            period="${{ github.event.client_payload.period }}"
          elif [ -n "${{ github.event.client_payload.mode }}" ]; then
            mode="${{ github.event.client_payload.mode }}"
          fi
          if [ -z "$period" ]; then
            period="daily"
          fi
          if [ "$mode" = "visa_reminder" ]; then
            args="visa-reminder --period $period"
          else
            args="fb-balance --mode $mode"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.client_payload.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Run Facebook balance monitor
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt: python -m googleads_dingtalk ${{ steps.choose-args.outputs.args }}"
            if python -m googleads_dingtalk ${{ steps.choose-args.outputs.args }}; then
              exit 0
            fi
            sleep 60
          done
          exit 1
