name: Google Ads Policy Monitor

on:
  repository_dispatch:
    types:
      - googleads_policy_monitor
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print DingTalk payload without sending"
        required: true
        default: false
        type: boolean

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      GOOGLE_ADS_CUSTOMER_IDS: ${{ secrets.GOOGLE_ADS_CUSTOMER_IDS }}
      GOOGLE_ADS_CONVERSION_METRIC: conversions
      REGISTER_CONVERSION_METRIC: all_conversions
      LOAN_CONVERSION_METRIC: all_conversions
      REGISTER_CONVERSION_NAME: in.pocketmitra (Android) register_success
      LOAN_CONVERSION_NAME: pocketmitra-b2e34 - in.pocketmitra (Android) first_loan_success
      POLICY_DINGTALK_WEBHOOK: ${{ secrets.POLICY_DINGTALK_WEBHOOK }}
      POLICY_DINGTALK_KEYWORD: 拒审
      POLICY_DINGTALK_SECRET: ${{ secrets.POLICY_DINGTALK_SECRET }}
      REPORT_TIMEZONE: Asia/Kolkata
      REPORT_BRAND: PocketMitra

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore policy monitor state
        uses: actions/cache@v4
        with:
          path: data/policy_alert_state.json
          key: googleads-policy-state-${{ github.run_id }}
          restore-keys: |
            googleads-policy-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Choose args
        id: choose-args
        run: |
          args="policy"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Run policy monitor
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt: python -m googleads_dingtalk ${{ steps.choose-args.outputs.args }}"
            if python -m googleads_dingtalk ${{ steps.choose-args.outputs.args }}; then
              exit 0
            fi
            sleep 60
          done
          exit 1
